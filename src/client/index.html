<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Payment Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #45a049;
    }

    .secondary {
      background: #2196F3;
    }

    .secondary:hover {
      background: #1e88e5;
    }

    .danger {
      background: #f44336;
    }

    .danger:hover {
      background: #d32f2f;
    }

    .output {
      margin-top: 15px;
      padding: 10px;
      background: #f1f1f1;
      border-radius: 6px;
      font-size: 13px;
      min-height: 40px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Payment Demo</h2>

  <!-- Payment -->
  <input type="number" id="amount" placeholder="Amount" />

  <select id="provider" onchange="toggleFields()">
    <option value="stripe">Stripe</option>
    <option value="mpesa">M-Pesa</option>
  </select>

  <!-- Stripe only -->
  <input type="text" id="currency" placeholder="Currency (e.g. USD)" />

  <!-- M-Pesa only -->
  <input type="text" id="phone" placeholder="Phone (2547...)" />

  <button onclick="initiatePayment()">Pay</button>

  <!-- Reference -->
  <input type="text" id="reference" placeholder="Transaction Reference" />

  <button class="secondary" onclick="checkStatus()">Check Status</button>
  <button class="danger" onclick="refund()">Refund</button>

  <div class="output" id="output">Waiting for action...</div>
</div>

<script>
  const BASE_URL = "http://localhost:5000/api"; // change if needed

  function setOutput(message) {
    document.getElementById("output").innerText = message;
  }

  function toggleFields() {
    const provider = document.getElementById("provider").value;

    const currency = document.getElementById("currency");
    const phone = document.getElementById("phone");

    if (provider === "stripe") {
      currency.classList.remove("hidden");
      phone.classList.add("hidden");
    } else {
      phone.classList.remove("hidden");
      currency.classList.add("hidden");
    }
  }

  async function initiatePayment() {
    const amount = document.getElementById("amount").value;
    const provider = document.getElementById("provider").value;

    const currency = document.getElementById("currency").value;
    const phone = document.getElementById("phone").value;

    if (!amount) return setOutput("Enter amount");

    const payload = {
      amount: Number(amount),
      provider,
      idempotencyKey: crypto.randomUUID()
    };

    if (provider === "stripe") {
      if (!currency) return setOutput("Enter currency for Stripe");
      payload.currency = currency;
    }

    if (provider === "mpesa") {
      if (!phone) return setOutput("Enter phone for M-Pesa");
      payload.phone = phone;
    }

    try {
      const res = await fetch(`${BASE_URL}/payments`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (data.reference) {
        document.getElementById("reference").value = data.reference;
      }

      setOutput(data.message || JSON.stringify(data));
    } catch (err) {
      setOutput("Payment request failed");
    }
  }

  async function checkStatus() {
    const reference = document.getElementById("reference").value;
    if (!reference) return setOutput("Enter reference");

    const res = await fetch(`${BASE_URL}/notifications/${reference}`);
    const data = await res.json();

    setOutput(`Status: ${data.status} | ${data.message}`);
  }

  async function refund() {
    const reference = document.getElementById("reference").value;
    if (!reference) return setOutput("Enter reference");

    const res = await fetch(`${BASE_URL}/refunds/${reference}`, {
      method: "POST"
    });

    const data = await res.json();

    setOutput(data.message || JSON.stringify(data));
  }

  // initialize on load
  window.onload = toggleFields;
</script>

</body>
</html>
