<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Payment Demo</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 360px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      position: relative;
    }

    button:hover {
      background: #45a049;
    }

    .secondary {
      background: #2196F3;
    }

    .secondary:hover {
      background: #1e88e5;
    }

    .danger {
      background: #f44336;
    }

    .danger:hover {
      background: #d32f2f;
    }

    .output {
      margin-top: 15px;
      padding: 10px;
      background: #f1f1f1;
      border-radius: 6px;
      font-size: 13px;
      min-height: 40px;
    }

    .hidden {
      display: none;
    }

    .helper {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
      text-align: center;
    }

    /* NEW: message styles */
    .message {
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }

    .success {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .error {
      background: #ffebee;
      color: #c62828;
    }

    /* NEW: spinner */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.6);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
      margin-left: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Payment Demo</h2>

  <input type="number" id="amount" placeholder="Amount" />

  <!-- NEW: payment message -->
  <div id="paymentMessage" class="message"></div>

  <select id="provider" onchange="toggleFields()">
    <option value="stripe" selected>Stripe</option>
    <option value="mpesa">M-Pesa</option>
  </select>

  <select id="currency">
    <option value="USD" selected>USD - US Dollar</option>
    <option value="EUR">EUR - Euro</option>
    <option value="GBP">GBP - British Pound</option>
    <option value="KES">KES - Kenyan Shilling</option>
  </select>

  <input type="text" id="phone" placeholder="Phone (2547...)" class="hidden" />

  <button id="payBtn" onclick="initiatePayment()">Pay</button>

  <div id="helperText" class="helper"></div>

  <button id="statusBtn" class="secondary" onclick="checkStatus()">Check Status</button>

  <input type="number" id="refundAmount" placeholder="Refund Amount" />

  <!-- NEW: refund message -->
  <div id="refundMessage" class="message"></div>

  <button id="refundBtn" class="danger" onclick="refund()">Refund</button>

  <div class="output" id="output">Waiting for action...</div>
</div>

<script>
  const BASE_URL = "http://localhost:5000/api";

  let lastReference = null;

  function showMessage(el, message, type = "success") {
    el.className = `message ${type}`;
    el.innerText = message;
    el.style.display = "block";

    setTimeout(() => {
      el.style.display = "none";
    }, 4000);
  }

  function setLoading(btn, isLoading) {
    if (isLoading) {
      btn.disabled = true;
      btn.dataset.originalText = btn.innerText;
      btn.innerHTML = btn.innerText + ' <span class="spinner"></span>';
    } else {
      btn.disabled = false;
      btn.innerText = btn.dataset.originalText;
    }
  }

  function setOutput(message) {
    document.getElementById("output").innerText = message;
  }

  function updateHelperText() {
  const helper = document.getElementById("helperText");
  helper.innerText = "";
  }

  function saveReference(ref) {
    localStorage.setItem("lastReference", ref);
  }

  function loadReference() {
    const ref = localStorage.getItem("lastReference");
    if (ref) lastReference = ref;
  }

  function toggleFields() {
    const provider = document.getElementById("provider").value;
    const currency = document.getElementById("currency");
    const phone = document.getElementById("phone");

    if (provider === "stripe") {
      currency.classList.remove("hidden");
      phone.classList.add("hidden");
    } else {
      phone.classList.remove("hidden");
      currency.classList.add("hidden");
    }
  }

  async function initiatePayment() {
    const btn = document.getElementById("payBtn");
    const msgEl = document.getElementById("paymentMessage");

    const amount = document.getElementById("amount").value;
    const provider = document.getElementById("provider").value;
    const currency = document.getElementById("currency").value;
    const phone = document.getElementById("phone").value;

    if (!amount) return showMessage(msgEl, "Enter amount", "error");

    setLoading(btn, true);

    const payload = {
      amount: Number(amount),
      provider,
      idempotencyKey: crypto.randomUUID()
    };

    if (provider === "stripe") payload.currency = currency;

    if (provider === "mpesa") {
      if (!phone) {
        setLoading(btn, false);
        return showMessage(msgEl, "Enter phone number", "error");
      }
      payload.phone = phone;
    }

    try {
      const res = await fetch(`${BASE_URL}/payments`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (data.reference) {
        lastReference = data.reference;
        saveReference(data.reference);
        updateHelperText();
      }

      document.getElementById("amount").value = "";

      showMessage(msgEl, data.message || "Payment initiated");

    } catch {
      showMessage(msgEl, "Payment failed", "error");
    } finally {
      setLoading(btn, false);
    }
  }

  async function checkStatus() {
    const btn = document.getElementById("statusBtn");

    if (!lastReference) return setOutput("No transaction available");

    setLoading(btn, true);

    try {
      const res = await fetch(`${BASE_URL}/notifications/${lastReference}`);
      const data = await res.json();

      setOutput(`Status: ${data.status || "unknown"} | ${data.message || ""}`);
    } catch {
      setOutput("Error checking status");
    } finally {
      setLoading(btn, false);
    }
  }

  async function refund() {
    const btn = document.getElementById("refundBtn");
    const msgEl = document.getElementById("refundMessage");

    if (!lastReference) return showMessage(msgEl, "No transaction available", "error");

    const refundAmount = document.getElementById("refundAmount").value;
    if (!refundAmount) return showMessage(msgEl, "Enter refund amount", "error");

    setLoading(btn, true);

    try {
      const res = await fetch(`${BASE_URL}/refunds/${lastReference}`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ amount: Number(refundAmount) })
      });

      const data = await res.json();

      if (res.ok) {
        document.getElementById("refundAmount").value = "";
        showMessage(msgEl, data.message || "Refund successful");
      } else {
        showMessage(msgEl, data.message || "Refund failed", "error");
      }

    } catch {
      showMessage(msgEl, "Error processing refund", "error");
    } finally {
      setLoading(btn, false);
    }
  }

  window.onload = () => {
    toggleFields();
    loadReference();
    updateHelperText();
  };
</script>

</body>
</html>
